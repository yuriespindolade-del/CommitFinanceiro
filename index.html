<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commit JR - Gestão de Membros</title>
    <!-- Bibliotecas Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; margin: 0; }
        .critical-alert { animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .overdelivery-badge { background: linear-gradient(45deg, #facc15, #eab308); }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { width: 30px; height: 30px; border: 4px solid #1e3a8a; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; height: 100vh; flex-direction: column; align-items: center; justify-content: center; color: #1e3a8a; font-family: sans-serif; gap: 1rem;">
            <div class="spinner"></div>
            <p>A estabelecer ligação com a Commit Cloud...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURAÇÃO DO FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCasLIhPZ-eu_wisn0fNzNVEymGUouJaS0",
            authDomain: "minhas-finacas.firebaseapp.com",
            projectId: "minhas-finacas",
            storageBucket: "minhas-finacas.firebasestorage.app",
            messagingSenderId: "1056339749032",
            appId: "1:1056339749032:web:375d2b01c4cba2a32efa9d"
        };

        const currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'commit-extension-v3';

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const ROLES_HOURS = {
            'diretor_inovacao': { title: 'Diretor de Inovação', hours: 20 },
            'diretor_comercial': { title: 'Diretor Comercial', hours: 16 },
            'diretor_projetos': { title: 'Diretor de Projetos', hours: 16 },
            'diretor_marketing': { title: 'Diretor de Marketing', hours: 16 },
            'vpgg': { title: 'VPGG', hours: 16 },
            'gerente': { title: 'Gerente', hours: 12 },
            'membro': { title: 'Membro', hours: 8 }
        };

        const Icons = {
            Clock: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Shield: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
            Award: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-7.714 2.143L11 21l-2.286-6.857L1 12l7.714-2.143L11 3z" /></svg>,
            Trash: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
        };

        function App() {
            const [members, setMembers] = useState([]);
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const [authReady, setAuthReady] = useState(false);
            const [error, setError] = useState(null);
            const [loginData, setLoginData] = useState({ email: '', password: '' });
            const [showLogin, setShowLogin] = useState(false);

            const dataDocRef = db.collection('artifacts').doc(currentAppId).collection('public').doc('data').collection('members').doc('list');

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await auth.signInAnonymously();
                    } catch (err) {
                        console.error("Auth init error:", err);
                        setError(`Erro de Autenticação: ${err.message}.`);
                    }
                };
                const unsubscribeAuth = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setAuthReady(true);
                    if(!u) initAuth();
                });
                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!authReady || !user) return;
                const unsubscribeData = dataDocRef.onSnapshot((doc) => {
                    if (doc.exists) {
                        setMembers(doc.data().members || []);
                        setError(null);
                    } else {
                        setMembers([]);
                        if (!user.isAnonymous) dataDocRef.set({ members: [] }).catch(console.error);
                    }
                    setLoading(false);
                }, (err) => {
                    setError(`Erro de Permissão Firestore: ${err.message}`);
                    setLoading(false);
                });
                return () => unsubscribeData();
            }, [user, authReady]);

            const saveMembers = async (newMembers) => {
                if (!user || user.isAnonymous) {
                    alert("Acesso Negado: Só administradores podem salvar.");
                    return;
                }
                try {
                    await dataDocRef.set({ members: newMembers }, { merge: true });
                } catch (err) {
                    alert(`Erro ao salvar: ${err.message}`);
                }
            };

            const calculateTimeInHouse = (startDateStr) => {
                if (!startDateStr) return "Data não definida";
                const start = new Date(startDateStr);
                const now = new Date();
                const diffTime = Math.abs(now - start);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                const months = Math.floor(diffDays / 30.41);
                const years = Math.floor(months / 12);
                
                if (years > 0) return `${years} ano(s) e ${months % 12} mês(es)`;
                if (months > 0) return `${months} mês(es)`;
                return `${diffDays} dia(s)`;
            };

            const getActivePoints = (history = []) => {
                const eightMonthsAgo = new Date();
                eightMonthsAgo.setMonth(eightMonthsAgo.getMonth() - 8);
                return (history || [])
                    .filter(h => new Date(h.date) >= eightMonthsAgo)
                    .reduce((acc, curr) => acc + Number(curr.points), 0);
            };

            const calculateWeeklyHours = (member) => {
                let base = member.roles.reduce((acc, roleKey) => acc + (ROLES_HOURS[roleKey]?.hours || 0), 0);
                return base + (member.extraHours || 0) - (member.penaltyHours || 0);
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                try {
                    await auth.signInWithEmailAndPassword(loginData.email, loginData.password);
                    setShowLogin(false);
                    setView('admin');
                } catch (err) { alert("Falha no login."); }
            };

            if (error) return (
                <div className="flex h-screen items-center justify-center bg-red-50 p-6 text-center">
                    <div className="bg-white p-8 rounded-3xl shadow-xl max-w-md animate-fadeIn">
                        <h2 className="text-gray-900 font-black mb-4 uppercase">Erro de Ligação</h2>
                        <p className="text-sm text-gray-600 mb-8">{error}</p>
                        <button onClick={() => window.location.reload()} className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold">Recarregar</button>
                    </div>
                </div>
            );

            if (loading || !authReady) return (
                <div className="flex h-screen items-center justify-center bg-gray-50">
                    <div className="spinner"></div>
                </div>
            );

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8 animate-fadeIn">
                    <header className="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 bg-blue-900 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-lg">C</div>
                            <div>
                                <h1 className="text-2xl font-black text-gray-900 tracking-tight italic">COMMIT JR</h1>
                                <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Controlo de Membros</p>
                            </div>
                        </div>

                        <nav className="flex bg-white rounded-2xl p-1 shadow-sm border border-gray-200">
                            {['dashboard', 'conduct'].map(v => (
                                <button key={v} onClick={() => setView(v)} className={`px-5 py-2 rounded-xl text-xs font-black uppercase tracking-wider transition ${view === v ? 'bg-blue-600 text-white shadow' : 'text-gray-400 hover:bg-gray-50'}`}>
                                    {v === 'dashboard' ? 'Painel' : 'Conduta'}
                                </button>
                            ))}
                            {user && !user.isAnonymous ? (
                                <button onClick={() => setView('admin')} className={`px-5 py-2 rounded-xl text-xs font-black uppercase tracking-wider transition ${view === 'admin' ? 'bg-blue-600 text-white shadow' : 'text-gray-400 hover:bg-gray-50'}`}>Gestão</button>
                            ) : (
                                <button onClick={() => setShowLogin(true)} className="px-5 py-2 rounded-xl text-xs font-black uppercase tracking-wider text-gray-400 hover:bg-gray-50">Login</button>
                            )}
                        </nav>
                        
                        {user && !user.isAnonymous && (
                            <button onClick={() => auth.signOut()} className="text-gray-400 hover:text-red-500 transition"><Icons.Trash /></button>
                        )}
                    </header>

                    {view === 'dashboard' && (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 animate-fadeIn">
                            {members.map(m => {
                                const points = getActivePoints(m.conductHistory);
                                return (
                                    <div key={m.id} className={`bg-white rounded-2xl shadow-sm p-6 border-l-4 ${points >= 20 ? 'border-red-600 critical-alert' : 'border-blue-600'}`}>
                                        <div className="flex justify-between items-start mb-4">
                                            <div className="max-w-[70%]">
                                                <h3 className="font-black text-gray-800 leading-tight truncate">{m.name}</h3>
                                                <p className="text-[9px] text-blue-600 font-black uppercase mt-1 truncate">{m.roles.map(r => ROLES_HOURS[r]?.title).join(' / ')}</p>
                                            </div>
                                            {m.isOverdelivery && (
                                                <div className="flex flex-col items-end shrink-0">
                                                    <span className="overdelivery-badge text-white text-[8px] px-2 py-1 rounded-lg font-black shadow-sm">OVERDELIVERY</span>
                                                    <span className="text-[7px] font-bold text-gray-400 mt-1 uppercase whitespace-nowrap">{m.overdeliveryDate}</span>
                                                </div>
                                            )}
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 pt-4 border-t border-gray-50">
                                            <div>
                                                <p className="text-[9px] font-bold text-gray-400 uppercase tracking-tighter">Carga Horária</p>
                                                <p className="text-lg font-black text-blue-700">{calculateWeeklyHours(m)}h</p>
                                            </div>
                                            <div>
                                                <p className="text-[9px] font-bold text-gray-400 uppercase tracking-tighter">Pontos Conduta</p>
                                                <p className={`text-lg font-black ${points >= 15 ? 'text-red-600' : 'text-gray-800'}`}>{points}/20</p>
                                            </div>
                                        </div>
                                        <div className="mt-4 pt-3 border-t border-gray-50 flex items-center justify-between">
                                            <div className="flex flex-col">
                                                <span className="text-[8px] font-bold text-gray-400 uppercase">Entrada</span>
                                                <span className="text-[10px] font-black text-gray-600">{new Date(m.startDate).toLocaleDateString()}</span>
                                            </div>
                                            <div className="flex flex-col items-end">
                                                <span className="text-[8px] font-bold text-gray-400 uppercase">Tempo de Casa</span>
                                                <span className="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">{calculateTimeInHouse(m.startDate)}</span>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {view === 'conduct' && (
                        <div className="space-y-6 animate-fadeIn">
                            {members.map(m => (
                                <div key={m.id} className="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
                                    <div className="px-6 py-4 bg-gray-50 border-b flex justify-between items-center">
                                        <h3 className="font-black text-gray-800 uppercase tracking-tight text-sm">{m.name}</h3>
                                        <span className={`text-sm font-black ${getActivePoints(m.conductHistory) >= 20 ? 'text-red-600' : 'text-blue-600'}`}>{getActivePoints(m.conductHistory)} pts ativos</span>
                                    </div>
                                    <div className="p-4 overflow-x-auto">
                                        <table className="w-full text-left text-xs min-w-[500px]">
                                            <thead className="text-gray-400 uppercase font-black">
                                                <tr><th className="py-2">Data</th><th className="py-2">Ocorrência</th><th className="py-2 text-right">Pts</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-50">
                                                {(m.conductHistory || []).sort((a,b) => new Date(b.date) - new Date(a.date)).map((h, i) => (
                                                    <tr key={i} className={new Date(h.date) < new Date().setMonth(new Date().getMonth() - 8) ? 'opacity-30' : ''}>
                                                        <td className="py-3">{new Date(h.date).toLocaleDateString()}</td>
                                                        <td className="py-3">{h.reason}</td>
                                                        <td className="py-3 text-right font-bold text-red-600">{h.points}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {view === 'admin' && user && !user.isAnonymous && (
                        <AdminPanel members={members} setMembers={setMembers} saveMembers={saveMembers} />
                    )}

                    {showLogin && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <form onSubmit={handleLogin} className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 animate-fadeIn">
                                <h2 className="text-xl font-black text-center mb-6">ADMIN ACCESS</h2>
                                <input type="email" placeholder="E-mail" className="w-full px-4 py-3 rounded-xl border mb-3 focus:ring-2 focus:ring-blue-500 outline-none" value={loginData.email} onChange={e => setLoginData({...loginData, email: e.target.value})} required/>
                                <input type="password" placeholder="Senha" className="w-full px-4 py-3 rounded-xl border mb-6 focus:ring-2 focus:ring-blue-500 outline-none" value={loginData.password} onChange={e => setLoginData({...loginData, password: e.target.value})} required/>
                                <div className="flex gap-2">
                                    <button type="button" onClick={() => setShowLogin(false)} className="flex-1 py-3 text-gray-400 font-black text-xs uppercase">Fechar</button>
                                    <button type="submit" className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-black text-xs uppercase shadow-lg shadow-blue-200">Aceder</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        function AdminPanel({ members, setMembers, saveMembers }) {
            const [newM, setNewM] = useState({ name: '', roles: ['membro'], startDate: new Date().toISOString().split('T')[0] });
            const [infraction, setInfraction] = useState({ memberId: '', points: 4, reason: '', date: new Date().toISOString().split('T')[0] });
            const [overdelivery, setOverdelivery] = useState({ memberId: '', dateStr: '' });

            const handleAddMember = () => {
                if(!newM.name) return;
                const updated = [...members, { id: Date.now().toString(), ...newM, conductHistory: [], extraHours: 0, penaltyHours: 0, isOverdelivery: false }];
                setMembers(updated); saveMembers(updated);
                setNewM({ ...newM, name: '' });
            };

            const addInfraction = () => {
                if(!infraction.memberId || !infraction.reason) return;
                const updated = members.map(m => m.id === infraction.memberId ? { ...m, conductHistory: [...(m.conductHistory || []), { ...infraction, id: Date.now().toString() }] } : m);
                setMembers(updated); saveMembers(updated);
                setInfraction({ ...infraction, reason: '' });
            };

            return (
                <div className="space-y-8 animate-fadeIn">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                            <h3 className="text-[10px] font-black uppercase text-gray-400 mb-4 tracking-widest text-center">Adicionar Membro</h3>
                            <div className="space-y-3">
                                <input type="text" placeholder="Nome Completo" className="w-full px-4 py-2 border rounded-xl text-sm" value={newM.name} onChange={e => setNewM({...newM, name: e.target.value})}/>
                                <div className="flex flex-col">
                                    <label className="text-[10px] font-bold text-gray-400 uppercase ml-2 mb-1">Data de Entrada</label>
                                    <input type="date" className="w-full px-4 py-2 border rounded-xl text-sm" value={newM.startDate} onChange={e => setNewM({...newM, startDate: e.target.value})}/>
                                </div>
                                <button onClick={handleAddMember} className="w-full py-2 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg">Salvar Membro</button>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                            <h3 className="text-[10px] font-black uppercase text-gray-400 mb-4 tracking-widest text-center">Lançar Conduta</h3>
                            <div className="space-y-3">
                                <select className="w-full px-4 py-2 border rounded-xl text-sm bg-white" value={infraction.memberId} onChange={e => setInfraction({...infraction, memberId: e.target.value})}>
                                    <option value="">Membro...</option>
                                    {members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                </select>
                                <div className="grid grid-cols-2 gap-2">
                                    <input type="number" className="px-4 py-2 border rounded-xl text-sm" value={infraction.points} onChange={e => setInfraction({...infraction, points: e.target.value})}/>
                                    <input type="date" className="px-4 py-2 border rounded-xl text-sm" value={infraction.date} onChange={e => setInfraction({...infraction, date: e.target.value})}/>
                                </div>
                                <input type="text" placeholder="Motivo" className="w-full px-4 py-2 border rounded-xl text-sm" value={infraction.reason} onChange={e => setInfraction({...infraction, reason: e.target.value})}/>
                                <button onClick={addInfraction} className="w-full py-2 bg-red-600 text-white rounded-xl text-[10px] font-black uppercase shadow-lg">Aplicar Pontos</button>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
                        <div className="overflow-x-auto custom-scrollbar">
                            <table className="w-full text-left text-xs min-w-[900px]">
                                <thead className="bg-gray-50 text-gray-400 uppercase font-black border-b tracking-tighter">
                                    <tr>
                                        <th className="p-4">Membro</th>
                                        <th className="p-4">Cargos</th>
                                        <th className="p-4">Entrada</th>
                                        <th className="p-4">Extra/Desc</th>
                                        <th className="p-4">Overdelivery</th>
                                        <th className="p-4 text-center">Ação</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-50">
                                    {members.map(m => (
                                        <tr key={m.id}>
                                            <td className="p-4 font-black">{m.name}</td>
                                            <td className="p-4">
                                                <div className="flex flex-wrap gap-1 max-w-[150px]">
                                                    {Object.keys(ROLES_HOURS).map(role => (
                                                        <button 
                                                            key={role}
                                                            onClick={() => {
                                                                const newRoles = m.roles.includes(role) ? m.roles.filter(r => r !== role) : [...m.roles, role];
                                                                const updated = members.map(x => x.id === m.id ? {...x, roles: newRoles.length ? newRoles : ['membro']} : x);
                                                                setMembers(updated); saveMembers(updated);
                                                            }}
                                                            className={`text-[7px] px-1 py-0.5 rounded uppercase font-bold transition ${m.roles.includes(role) ? 'bg-blue-600 text-white shadow' : 'bg-gray-100 text-gray-400'}`}
                                                        >
                                                            {ROLES_HOURS[role].title.split(' ')[0]}
                                                        </button>
                                                    ))}
                                                </div>
                                            </td>
                                            <td className="p-4">
                                                <input type="date" className="p-1 border rounded text-[10px]" value={m.startDate} onChange={e => {
                                                    const updated = members.map(x => x.id === m.id ? { ...x, startDate: e.target.value } : x);
                                                    setMembers(updated); saveMembers(updated);
                                                }}/>
                                            </td>
                                            <td className="p-4">
                                                <div className="flex gap-1">
                                                    <input type="number" className="w-10 p-1 border rounded text-[10px]" value={m.extraHours} onChange={e => {
                                                        const updated = members.map(x => x.id === m.id ? { ...x, extraHours: parseInt(e.target.value) || 0 } : x);
                                                        setMembers(updated); saveMembers(updated);
                                                    }}/>
                                                    <input type="number" className="w-10 p-1 border rounded text-[10px]" value={m.penaltyHours} onChange={e => {
                                                        const updated = members.map(x => x.id === m.id ? { ...x, penaltyHours: parseInt(e.target.value) || 0 } : x);
                                                        setMembers(updated); saveMembers(updated);
                                                    }}/>
                                                </div>
                                            </td>
                                            <td className="p-4">
                                                <div className="flex gap-2">
                                                    <input type="text" placeholder="Semana X" className="flex-1 p-1 border rounded text-[10px]" value={overdelivery.memberId === m.id ? overdelivery.dateStr : (m.isOverdelivery ? m.overdeliveryDate : '')} onChange={e => setOverdelivery({ memberId: m.id, dateStr: e.target.value })}/>
                                                    <button onClick={() => {
                                                        const dateToUse = overdelivery.memberId === m.id ? overdelivery.dateStr : m.overdeliveryDate;
                                                        const updated = members.map(x => x.id === m.id ? { ...x, isOverdelivery: !x.isOverdelivery, overdeliveryDate: dateToUse } : x);
                                                        setMembers(updated); saveMembers(updated);
                                                    }} className={`px-2 py-1 rounded-lg text-[8px] font-black uppercase transition ${m.isOverdelivery ? 'bg-yellow-400 text-white shadow' : 'bg-gray-100 text-gray-400'}`}>Fixar</button>
                                                </div>
                                            </td>
                                            <td className="p-4 text-center">
                                                <button onClick={() => {
                                                    if(confirm(`Remover ${m.name}?`)) {
                                                        const updated = members.filter(x => x.id !== m.id);
                                                        setMembers(updated); saveMembers(updated);
                                                    }
                                                }} className="text-gray-300 hover:text-red-500 transition"><Icons.Trash /></button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
