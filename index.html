<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commit JR - Gestão de Membros</title>
    <!-- Bibliotecas Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; margin: 0; }
        .critical-alert { animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .overdelivery-badge { background: linear-gradient(45deg, #facc15, #eab308); }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; height: 100vh; align-items: center; justify-content: center; color: #1e3a8a; font-family: sans-serif;">
            <p>Carregando sistema...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURAÇÃO DO FIREBASE ---
        const manualConfig = {
            apiKey: "AIzaSyCasLIhPZ-eu_wisn0fNzNVEymGUouJaS0",
            authDomain: "minhas-finacas.firebaseapp.com",
            projectId: "minhas-finacas",
            storageBucket: "minhas-finacas.firebasestorage.app",
            messagingSenderId: "1056339749032",
            appId: "1:1056339749032:web:375d2b01c4cba2a32efa9d"
        };

        let firebaseConfig;
        try {
            firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : manualConfig;
        } catch (e) {
            firebaseConfig = manualConfig;
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'commit-extension-v2';

        // Inicialização Segura
        let db, auth;
        try {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            auth = firebase.auth();
        } catch (err) {
            console.error("Erro ao inicializar Firebase:", err);
        }

        const ROLES_HOURS = {
            'diretor_inovacao': { title: 'Diretor de Inovação', hours: 20 },
            'diretor_comercial': { title: 'Diretor Comercial', hours: 16 },
            'diretor_projetos': { title: 'Diretor de Projetos', hours: 16 },
            'diretor_marketing': { title: 'Diretor de Marketing', hours: 16 },
            'vpgg': { title: 'VPGG', hours: 16 },
            'gerente': { title: 'Gerente', hours: 12 },
            'membro': { title: 'Membro', hours: 8 }
        };

        const Icons = {
            Clock: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Shield: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
            Award: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-7.714 2.143L11 21l-2.286-6.857L1 12l7.714-2.143L11 3z" /></svg>,
            History: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Trash: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
        };

        function App() {
            const [members, setMembers] = useState([]);
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [loginData, setLoginData] = useState({ email: '', password: '' });
            const [showLogin, setShowLogin] = useState(false);

            // Caminho fixo conforme regras do ambiente
            const dataDocRef = db ? db.collection('artifacts').doc(appId).collection('public').doc('data').collection('members').doc('all') : null;

            useEffect(() => {
                if (!auth) {
                    setError("Configuração do Firebase ausente. Verifique as credenciais no topo do código.");
                    setLoading(false);
                    return;
                }

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.warn("Auth initialization skipped/failed:", err);
                    }
                };
                initAuth();
                const unsub = auth.onAuthStateChanged(setUser);
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user || !dataDocRef) return;
                const unsub = dataDocRef.onSnapshot(doc => {
                    if (doc.exists) setMembers(doc.data().members || []);
                    else if (!user.isAnonymous) dataDocRef.set({ members: [] });
                    setLoading(false);
                }, (err) => {
                    console.error("Firestore Error:", err);
                    setLoading(false);
                });
                return () => unsub();
            }, [user]);

            const saveMembers = async (newMembers) => {
                if (!user || user.isAnonymous) return;
                await dataDocRef.set({ members: newMembers }, { merge: true });
            };

            const getActivePoints = (history = []) => {
                const eightMonthsAgo = new Date();
                eightMonthsAgo.setMonth(eightMonthsAgo.getMonth() - 8);
                return (history || [])
                    .filter(h => new Date(h.date) >= eightMonthsAgo)
                    .reduce((acc, curr) => acc + Number(curr.points), 0);
            };

            const calculateWeeklyHours = (member) => {
                let base = member.roles.reduce((acc, roleKey) => acc + (ROLES_HOURS[roleKey]?.hours || 0), 0);
                return base + (member.extraHours || 0) - (member.penaltyHours || 0);
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                try {
                    await auth.signInWithEmailAndPassword(loginData.email, loginData.password);
                    setShowLogin(false);
                    setView('admin');
                } catch (err) { alert("Credenciais inválidas ou sem permissão de acesso."); }
            };

            if (error) return (
                <div className="flex h-screen items-center justify-center bg-red-50 p-4 text-center">
                    <div className="bg-white p-8 rounded-2xl shadow-xl max-w-sm">
                        <h2 className="text-red-600 font-black mb-2">ERRO FIREBASE</h2>
                        <p className="text-sm text-gray-600">{error}</p>
                    </div>
                </div>
            );

            if (loading) return (
                <div className="flex h-screen items-center justify-center bg-gray-50">
                    <div className="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                </div>
            );

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    <header className="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 bg-blue-900 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-lg">C</div>
                            <div>
                                <h1 className="text-2xl font-black text-gray-900 tracking-tight">COMMIT JR</h1>
                                <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Portal de Gestão</p>
                            </div>
                        </div>

                        <nav className="flex bg-white rounded-2xl p-1 shadow-sm border border-gray-200">
                            {['dashboard', 'conduct'].map(v => (
                                <button key={v} onClick={() => setView(v)} className={`px-5 py-2 rounded-xl text-xs font-black uppercase tracking-wider transition ${view === v ? 'bg-blue-600 text-white shadow' : 'text-gray-400 hover:bg-gray-50'}`}>
                                    {v === 'dashboard' ? 'Início' : 'Conduta'}
                                </button>
                            ))}
                            {user && !user.isAnonymous ? (
                                <button onClick={() => setView('admin')} className={`px-5 py-2 rounded-xl text-xs font-black uppercase tracking-wider transition ${view === 'admin' ? 'bg-blue-600 text-white shadow' : 'text-gray-400 hover:bg-gray-50'}`}>Admin</button>
                            ) : (
                                <button onClick={() => setShowLogin(true)} className="px-5 py-2 rounded-xl text-xs font-black uppercase tracking-wider text-gray-400 hover:bg-gray-50">Entrar</button>
                            )}
                        </nav>
                    </header>

                    {view === 'dashboard' && (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 animate-fadeIn">
                            {members.map(m => {
                                const points = getActivePoints(m.conductHistory);
                                return (
                                    <div key={m.id} className={`bg-white rounded-2xl shadow-sm p-6 border-l-4 ${points >= 20 ? 'border-red-600 critical-alert' : 'border-blue-600'}`}>
                                        <div className="flex justify-between items-start mb-4">
                                            <div className="max-w-[70%]">
                                                <h3 className="font-black text-gray-800 leading-tight truncate" title={m.name}>{m.name}</h3>
                                                <p className="text-[9px] text-blue-600 font-black uppercase mt-1 truncate">{m.roles.map(r => ROLES_HOURS[r]?.title).join(' / ')}</p>
                                            </div>
                                            {m.isOverdelivery && (
                                                <div className="flex flex-col items-end shrink-0">
                                                    <span className="overdelivery-badge text-white text-[8px] px-2 py-1 rounded-lg font-black shadow-sm">OVERDELIVERY</span>
                                                    <span className="text-[7px] font-bold text-gray-400 mt-1 uppercase whitespace-nowrap">{m.overdeliveryDate}</span>
                                                </div>
                                            )}
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 pt-4 border-t border-gray-50">
                                            <div>
                                                <p className="text-[9px] font-bold text-gray-400 uppercase tracking-tighter">Horas Semanais</p>
                                                <p className="text-lg font-black text-blue-700">{calculateWeeklyHours(m)}h</p>
                                            </div>
                                            <div>
                                                <p className="text-[9px] font-bold text-gray-400 uppercase tracking-tighter">Pontos (8 meses)</p>
                                                <p className={`text-lg font-black ${points >= 15 ? 'text-red-600' : 'text-gray-800'}`}>{points}/20</p>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                            {members.length === 0 && <div className="col-span-full py-12 text-center text-gray-400 font-bold uppercase text-xs">Nenhum membro cadastrado</div>}
                        </div>
                    )}

                    {view === 'conduct' && (
                        <div className="space-y-6 animate-fadeIn">
                            {members.map(m => (
                                <div key={m.id} className="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
                                    <div className="px-6 py-4 bg-gray-50 border-b flex justify-between items-center">
                                        <h3 className="font-black text-gray-800 uppercase tracking-tight text-sm truncate">{m.name}</h3>
                                        <div className="flex items-center gap-2 shrink-0">
                                            <span className="text-[10px] font-black text-gray-400 uppercase">Total Ativo:</span>
                                            <span className={`text-sm font-black ${getActivePoints(m.conductHistory) >= 20 ? 'text-red-600' : 'text-blue-600'}`}>{getActivePoints(m.conductHistory)} pts</span>
                                        </div>
                                    </div>
                                    <div className="p-4 overflow-x-auto custom-scrollbar">
                                        <table className="w-full text-left text-xs min-w-[500px]">
                                            <thead className="text-gray-400 uppercase font-black">
                                                <tr>
                                                    <th className="px-2 py-2 w-24">Data</th>
                                                    <th className="px-2 py-2">Motivo</th>
                                                    <th className="px-2 py-2 text-right w-16">Pts</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-50">
                                                {(m.conductHistory || []).sort((a,b) => new Date(b.date) - new Date(a.date)).map((h, i) => {
                                                    const isExpired = new Date(h.date) < new Date().setMonth(new Date().getMonth() - 8);
                                                    return (
                                                        <tr key={i} className={isExpired ? 'opacity-30' : ''}>
                                                            <td className="px-2 py-3 whitespace-nowrap font-medium">{new Date(h.date).toLocaleDateString()}</td>
                                                            <td className="px-2 py-3">{h.reason} {isExpired && <span className="ml-2 text-[8px] bg-gray-200 px-1 rounded uppercase font-bold">Expirado</span>}</td>
                                                            <td className="px-2 py-3 text-right font-bold text-red-600">{h.points}</td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                        {(!m.conductHistory || m.conductHistory.length === 0) && <p className="text-center py-4 text-gray-400 text-[10px] font-bold uppercase">Sem ocorrências</p>}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {view === 'admin' && user && !user.isAnonymous && (
                        <AdminPanel members={members} setMembers={setMembers} saveMembers={saveMembers} />
                    )}

                    {showLogin && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <form onSubmit={handleLogin} className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 animate-fadeIn">
                                <h2 className="text-xl font-black text-center mb-6">ADMINISTRATIVO</h2>
                                <input type="email" placeholder="E-mail" className="w-full px-4 py-3 rounded-xl border mb-3 focus:ring-2 focus:ring-blue-500 outline-none" value={loginData.email} onChange={e => setLoginData({...loginData, email: e.target.value})} required/>
                                <input type="password" placeholder="Senha" className="w-full px-4 py-3 rounded-xl border mb-6 focus:ring-2 focus:ring-blue-500 outline-none" value={loginData.password} onChange={e => setLoginData({...loginData, password: e.target.value})} required/>
                                <div className="flex gap-2">
                                    <button type="button" onClick={() => setShowLogin(false)} className="flex-1 py-3 text-gray-400 font-black text-xs uppercase">Voltar</button>
                                    <button type="submit" className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-black text-xs uppercase shadow-lg shadow-blue-200">Entrar</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        function AdminPanel({ members, setMembers, saveMembers }) {
            const [newM, setNewM] = useState({ name: '', roles: ['membro'], startDate: new Date().toISOString().split('T')[0] });
            const [infraction, setInfraction] = useState({ memberId: '', points: 4, reason: '', date: new Date().toISOString().split('T')[0] });
            const [overdelivery, setOverdelivery] = useState({ memberId: '', dateStr: '' });

            const handleAddMember = () => {
                if(!newM.name) return;
                const updated = [...members, { id: Date.now().toString(), ...newM, conductHistory: [], extraHours: 0, penaltyHours: 0, isOverdelivery: false }];
                setMembers(updated); saveMembers(updated);
                setNewM({ ...newM, name: '' });
            };

            const addInfraction = () => {
                if(!infraction.memberId || !infraction.reason) return;
                const updated = members.map(m => m.id === infraction.memberId ? { ...m, conductHistory: [...(m.conductHistory || []), { ...infraction, id: Date.now().toString() }] } : m);
                setMembers(updated); saveMembers(updated);
                setInfraction({ ...infraction, reason: '' });
            };

            return (
                <div className="space-y-8 animate-fadeIn">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                            <h3 className="text-[10px] font-black uppercase text-gray-400 mb-4 tracking-widest">Cadastrar Membro</h3>
                            <div className="space-y-3">
                                <input type="text" placeholder="Nome Completo" className="w-full px-4 py-2 border rounded-xl text-sm" value={newM.name} onChange={e => setNewM({...newM, name: e.target.value})}/>
                                <button onClick={handleAddMember} className="w-full py-2 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest">Salvar</button>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                            <h3 className="text-[10px] font-black uppercase text-gray-400 mb-4 tracking-widest">Lançar Pontos de Conduta</h3>
                            <div className="space-y-3">
                                <select className="w-full px-4 py-2 border rounded-xl text-sm bg-white" value={infraction.memberId} onChange={e => setInfraction({...infraction, memberId: e.target.value})}>
                                    <option value="">Selecionar...</option>
                                    {members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                </select>
                                <div className="grid grid-cols-2 gap-2">
                                    <input type="number" placeholder="Pontos" className="px-4 py-2 border rounded-xl text-sm" value={infraction.points} onChange={e => setInfraction({...infraction, points: e.target.value})}/>
                                    <input type="date" className="px-4 py-2 border rounded-xl text-sm" value={infraction.date} onChange={e => setInfraction({...infraction, date: e.target.value})}/>
                                </div>
                                <input type="text" placeholder="Motivo da infração" className="w-full px-4 py-2 border rounded-xl text-sm" value={infraction.reason} onChange={e => setInfraction({...infraction, reason: e.target.value})}/>
                                <button onClick={addInfraction} className="w-full py-2 bg-red-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest">Aplicar</button>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
                        <div className="p-4 bg-gray-50 border-b">
                            <h3 className="text-[10px] font-black uppercase text-gray-400 tracking-widest">Gerenciador Geral</h3>
                        </div>
                        <div className="overflow-x-auto custom-scrollbar">
                            <table className="w-full text-left text-xs min-w-[800px]">
                                <thead className="bg-gray-50 text-gray-400 uppercase font-black border-b">
                                    <tr>
                                        <th className="p-4">Membro</th>
                                        <th className="p-4">Cargos</th>
                                        <th className="p-4">Extras/Descontos</th>
                                        <th className="p-4">Overdelivery</th>
                                        <th className="p-4 text-center">Excluir</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-50">
                                    {members.map(m => (
                                        <tr key={m.id}>
                                            <td className="p-4 font-black">{m.name}</td>
                                            <td className="p-4">
                                                <div className="flex flex-wrap gap-1 max-w-[200px]">
                                                    {Object.keys(ROLES_HOURS).map(role => (
                                                        <button 
                                                            key={role}
                                                            onClick={() => {
                                                                const newRoles = m.roles.includes(role) ? m.roles.filter(r => r !== role) : [...m.roles, role];
                                                                const updated = members.map(x => x.id === m.id ? {...x, roles: newRoles.length ? newRoles : ['membro']} : x);
                                                                setMembers(updated); saveMembers(updated);
                                                            }}
                                                            className={`text-[8px] px-1 py-0.5 rounded uppercase font-bold transition ${m.roles.includes(role) ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-400'}`}
                                                        >
                                                            {ROLES_HOURS[role].title.split(' ')[0]}
                                                        </button>
                                                    ))}
                                                </div>
                                            </td>
                                            <td className="p-4">
                                                <div className="flex gap-1">
                                                    <input type="number" placeholder="+" className="w-10 p-1 border rounded text-[10px]" value={m.extraHours} onChange={e => {
                                                        const updated = members.map(x => x.id === m.id ? { ...x, extraHours: parseInt(e.target.value) || 0 } : x);
                                                        setMembers(updated); saveMembers(updated);
                                                    }}/>
                                                    <input type="number" placeholder="-" className="w-10 p-1 border rounded text-[10px]" value={m.penaltyHours} onChange={e => {
                                                        const updated = members.map(x => x.id === m.id ? { ...x, penaltyHours: parseInt(e.target.value) || 0 } : x);
                                                        setMembers(updated); saveMembers(updated);
                                                    }}/>
                                                </div>
                                            </td>
                                            <td className="p-4">
                                                <div className="flex gap-2">
                                                    <input type="text" placeholder="Semana/Mês" className="flex-1 p-1 border rounded text-[10px]" value={overdelivery.memberId === m.id ? overdelivery.dateStr : (m.isOverdelivery ? m.overdeliveryDate : '')} onChange={e => setOverdelivery({ memberId: m.id, dateStr: e.target.value })}/>
                                                    <button onClick={() => {
                                                        const dateToUse = overdelivery.memberId === m.id ? overdelivery.dateStr : m.overdeliveryDate;
                                                        const updated = members.map(x => x.id === m.id ? { ...x, isOverdelivery: !x.isOverdelivery, overdeliveryDate: dateToUse } : x);
                                                        setMembers(updated); saveMembers(updated);
                                                    }} className={`px-2 py-1 rounded-lg text-[8px] font-black uppercase transition ${m.isOverdelivery ? 'bg-yellow-400 text-white' : 'bg-gray-100 text-gray-400'}`}>Fixar</button>
                                                </div>
                                            </td>
                                            <td className="p-4 text-center">
                                                <button onClick={() => {
                                                    if(confirm(`Excluir ${m.name}?`)) {
                                                        const updated = members.filter(x => x.id !== m.id);
                                                        setMembers(updated); saveMembers(updated);
                                                    }
                                                }} className="text-gray-300 hover:text-red-500 transition"><Icons.Trash /></button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
